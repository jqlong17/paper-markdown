name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: paper-markdown
          - target: x86_64-apple-darwin
            os: macos-13
            binary: paper-markdown
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: paper-markdown
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: paper-markdown.exe

    steps:
    - uses: actions/checkout@v4

    - name: Install Linux dependencies
      if: matrix.target == 'x86_64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libglib2.0-dev \
          libgtk-3-dev \
          libwebkit2gtk-4.0-dev \
          libsoup2.4-dev

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build
      run: cargo build --release --target ${{ matrix.target }}

    - name: Package (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        cd target/${{ matrix.target }}/release
        tar czvf ../../../paper-markdown-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
        cd ../../..

    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cd target/${{ matrix.target }}/release
        7z a ../../../paper-markdown-${{ matrix.target }}.zip ${{ matrix.binary }}
        cd ../../..

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: paper-markdown-${{ matrix.target }}
        path: |
          paper-markdown-*.tar.gz
          paper-markdown-*.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          paper-markdown-*/paper-markdown-*.tar.gz
          paper-markdown-*/paper-markdown-*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
